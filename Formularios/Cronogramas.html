<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma de Mantenimientos</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .container-flex {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 60px;
        }
        .footer {
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        .table thead {
            background-color: #007bff;
            color: white;
        }
        .table tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        .header-container {
            background-color: #007bff;
            color: white;
            padding: 10px;
        }
        header h1, header nav {
            margin: 0;
        }
        header nav a {
            color: white;
        }
        .header-container, .footer {
            flex-shrink: 0;
        }
        .container-flex {
            flex-grow: 1;
            overflow-y: auto;
        }
        .form-container {
            max-height: 500px;
            overflow-y: auto;
        }
        .title-centered {
            text-align: center;
        }
        .header, .footer {
            background-color: #007bff;
            color: white;
        }
        .header a, .footer a {
            color: white;
        }
        .header {
            padding: 10px 0;
        }
        .header .navbar {
            padding: 0;
        }
        .footer {
            padding: 10px 0;
            text-align: center;
        }
        .form-container {
            max-width: 350px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header-container">
        <header class="container">
            <h1 class="text-center">SIEC WEB</h1>
            <nav class="nav justify-content-center">
                <a class="nav-link text-white" href="PaginaMaestra">Inicio</a>
                <a class="nav-link text-white" href="#">Formulario</a>
                <a class="nav-link text-white" href="Contacto.aspx">Contacto</a>
            </nav>
        </header>
    </div>

    <div class="container-flex container mt-4">
        <div class="row">
            <div class="col-md-4 form-container">
                <h3>Agregar Mantenimiento</h3>
                <form id="maintenanceForm">
                    <div class="form-group">
                        <label for="idEmpleado">ID Empleado</label>
                        <input type="text" class="form-control" id="idEmpleado" required>
                    </div>
                    <div class="form-group">
                        <label for="idEquipo">ID Equipo</label>
                        <input type="text" class="form-control" id="idEquipo" required>
                    </div>
                    <div class="form-group">
                        <label for="fechaMantenimiento">Fecha de Mantenimiento</label>
                        <input type="date" class="form-control" id="fechaMantenimiento" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Agregar</button>
                </form>
            </div>
            <div class="col-md-8">
                <h3 class="title-centered">Cronograma de Mantenimientos</h3>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>ID Empleado</th>
                                <th>ID Equipo</th>
                                <th>Fecha de Mantenimiento</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="maintenanceTableBody">
                            <!-- Contenido dinámico -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            &copy; 2024 SIEC WEB. Todos los derechos reservados.
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="mantenimientos.js"></script>
</body>
</html>
