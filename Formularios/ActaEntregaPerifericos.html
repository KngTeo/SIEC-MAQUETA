<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acta de Entrega de Periféricos</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .header-container, .footer-section {
            background-color: #007bff;
            color: white;
        }
        .header-container {
            padding: 10px;
        }
        .header-container header h1, .header-container header nav a {
            margin: 0;
            color: white;
        }
        .footer-section {
            text-align: center;
            padding: 15px;
            margin-top: auto;
        }
        .form-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border: 2px solid #007bff;
            margin: 20px;
        }
        .section-title {
            font-weight: bold;
            text-decoration: underline;
            background-color: #007bff;
            color: white;
            padding: 10px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <header class="container">
            <h1 class="text-center">SIEC WEB</h1>
            <nav class="nav justify-content-center">
                <a class="nav-link text-white" href="Masterpage.html">Inicio</a>
                <a class="nav-link text-white" href="#">Formulario</a>
                <a class="nav-link text-white" href="Contacto.aspx">Contacto</a>
            </nav>
        </header>
    </div>

    <div class="container-flex container">
        <div class="form-container">
            <div class="header-section text-center">
                <h4>Acta de Entrega de Periféricos</h4>
                <p>Código: FO6I-0033 | Fecha: 13/10/2021 | Versión: 1</p>
            </div>

            <div class="section-title">Información del Empleado</div>
            <form id="peripheralForm">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="cedula">Cédula</label>
                        <input type="text" class="form-control" id="cedula" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="nombre">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="cargo">Cargo</label>
                        <input type="text" class="form-control" id="cargo" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="area">Área/Departamento</label>
                        <input type="text" class="form-control" id="area" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="agencia">Agencia</label>
                    <input type="text" class="form-control" id="agencia" required>
                </div>

                <div class="section-title">Características del Equipo</div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="idEquipo">ID Equipo - Serial</label>
                        <input type="text" class="form-control" id="idEquipo" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="tipoEquipo">Tipo de Equipo</label>
                        <input type="text" class="form-control" id="tipoEquipo" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="modelo">Modelo</label>
                        <input type="text" class="form-control" id="modelo" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="marca">Marca</label>
                        <input type="text" class="form-control" id="marca" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="observacion">Observación</label>
                    <textarea class="form-control" id="observacion" rows="3" required></textarea>
                </div>
                <div class="form-group text-center">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div class="footer-section">
        <p>&copy; 2024 SIEC WEB. Todos los derechos reservados.</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="acta_perifericos.js"></script>
</body>
</html>
