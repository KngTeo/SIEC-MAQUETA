<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mantenimiento Correctivo</title>
  <!-- Bootstrap 4 -->
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <!-- SignaturePad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <!-- html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-light">

  <div class="container my-5">
    <div class="card mx-auto" style="max-width:700px" id="actaContainer">
      <div class="card-body">
        <h4 class="card-title text-center mb-4">Mantenimiento Correctivo</h4>

        <!-- Información General -->
        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Nro. Acta</label>
            <input id="nroActa" class="form-control" readonly>
          </div>
          <div class="form-group col-md-6">
            <label>Fecha</label>
            <input id="fechaActa" type="date" class="form-control" readonly>
          </div>
        </div>
        <div class="form-group">
          <label>Responsable Técnico</label>
          <input id="responsable" class="form-control" readonly>
        </div>

        <!-- Datos del Equipo -->
        <h5 class="mt-4">Datos del Equipo</h5>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Serial Equipo</label>
            <input id="eqSerial" class="form-control" readonly>
          </div>
          <div class="form-group col-md-6">
            <label>Tipo Equipo</label>
            <input id="eqTipo" class="form-control" readonly>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group col-md-6">
            <label>Modelo / Marca</label>
            <input id="eqModeloMarca" class="form-control" readonly>
          </div>
          <div class="form-group col-md-6">
            <label>Tipo de mantenimiento</label>
            <input id="tipoMtto" class="form-control" readonly>
          </div>
        </div>

        <!-- Observaciones Previas -->
        <div class="form-group">
          <label>Observaciones Programadas</label>
          <textarea id="obsProgramada" class="form-control" rows="2" readonly></textarea>
        </div>

        <!-- Recomendaciones y Estado Final -->
        <div class="form-group">
          <label>Recomendaciones</label>
          <textarea id="recomendaciones" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Estado Final del Equipo</label>
          <textarea id="estadoFinal" class="form-control" rows="1"></textarea>
        </div>

        <!-- Firma Digital -->
        <div class="form-group">
          <label>Firma Digital</label>
          <canvas id="signature-pad" class="border w-100" style="height:150px"></canvas>
          <button id="clear-sign" class="btn btn-secondary btn-sm mt-2">Limpiar Firma</button>
        </div>

        <!-- Generar PDF -->
        <div class="text-right">
          <button id="btn-generate" class="btn btn-success" disabled>Generar PDF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer verde -->
  <footer class="footer bg-success text-white text-center py-2">
    &copy; 2024 SIEC WEB. Todos los derechos reservados.
  </footer>

  <!-- jQuery + Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const params    = new URLSearchParams(location.search);
    const id        = params.get('id');
    if (!id) return alert('No se proporcionó el ID de mantenimiento.');

    // 1) Autorrelleno inicial
    document.getElementById('nroActa').value   = '1';
    document.getElementById('fechaActa').value = new Date().toISOString().slice(0,10);

    // 2) Carga responsable desde localStorage
    const usuarioJSON = localStorage.getItem('usuario');
    if (usuarioJSON) {
      try {
        const usu = JSON.parse(usuarioJSON);
        if (usu.nombreUsuario) {
          document.getElementById('responsable').value = usu.nombreUsuario;
        }
      } catch(e) {
        console.error('Error parseando usuario:', e);
      }
    }

    // 3) Traer datos del cronograma → equipo
    fetch(`http://localhost:3000/api/cronogramas/${id}`)
      .then(r => {
        if (!r.ok) throw new Error('Cronograma no encontrado');
        return r.json();
      })
      .then(data => {
        document.getElementById('eqSerial').value      = data.NumeroSerie;
        document.getElementById('eqTipo').value        = data.TipoEquipo;
        document.getElementById('eqModeloMarca').value = `${data.Modelo} / ${data.Marca}`;
        document.getElementById('tipoMtto').value      = data.Tipo;
        document.getElementById('obsProgramada').value = data.Observacion || '';

        // Habilitar botón solo si Estado === 'Realizado'
        if (data.Estado === 'Realizado') {
          document.getElementById('btn-generate').removeAttribute('disabled');
        }
      })
      .catch(err => {
        console.error('Error al cargar cronograma:', err);
        alert('No se pudo cargar la información del mantenimiento.');
      });

    // 4) SignaturePad
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);
    document.getElementById('clear-sign')
      .addEventListener('click', () => {
        signaturePad.clear();
        document.getElementById('btn-generate').setAttribute('disabled','');
      });

    // 5) Generar PDF con html2pdf.js
    document.getElementById('btn-generate')
      .addEventListener('click', () => {
        if (signaturePad.isEmpty()) {
          return alert('Debe firmar antes de generar el PDF.');
        }
        // Incluimos la firma como imagen en el canvas
        const imgData = signaturePad.toDataURL();
        // Adjuntamos la firma al documento:
        const img = new Image();
        img.src = imgData;
        img.style.width = '100%';
        // Antes de generar, insertamos la imagen debajo de la tarjeta:
        const cont = document.getElementById('actaContainer');
        cont.appendChild(img);

        // Configuración html2pdf
        const opt = {
          margin:       [0.5, 0.5, 0.5, 0.5],
          filename:     `Acta_${document.getElementById('nroActa').value}.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2 },
          jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        // Disparamos la descarga
        html2pdf().set(opt).from(cont).save().then(() => {
          // opcional: quitar la firma insertada tras generar
          cont.removeChild(img);
        });
      });
  });
  </script>

</body>
</html>
