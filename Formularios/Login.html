<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 20px 0;
        }
        .header a {
            color: white;
        }
        .login-form {
            background-color: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .footer {
            background-color: #4CAF50;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <h1>SIEC</h1>
    </div>
</header>

<div class="login-container">
    <form class="login-form" onsubmit="return validateLogin()">
        <h3 class="text-center">Inicio de Sesión</h3>
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" class="form-control" id="username" placeholder="Ingrese su usuario" required>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required>
        </div>
        <div class="form-group">
                        <label for="empresa">Seleccione Empresa</label>
                        <select class="form-control" id="empresa" required>
                            <option>Mototransportamos SAS </option>
                            <option>Motoseguridad Ltda</option>
                            <option>Refrilogistica SASr</option>
                            <option>Cia Capri SAS</option>
                            <option>Tramitar Seguros SAS</option>
                            <option>Cefatrans SAS</option>
                            <option>Labor Health IPS</option>
                            <option>UTCiant SAS</option>
                        </select>
        </div>
        <%--<div class="form-group text-right">
            <a href="#" class="text-primary">Olvidé mi contraseña</a>
        </div>--%>
        <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
    </form>
</div>

<footer class="footer">
    <p>&copy; 2024 SIEC. Todos los derechos reservados.</p>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    function validateLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (username === '1' && password === '1') {
            window.location.href = 'PaginaMaestra.aspx'; 
            return false;
        } else {
            alert('Usuario o contraseña incorrectos');
            return false;
        }
    }
</script>

</body>
</html>
